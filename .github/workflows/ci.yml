name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: Shellcheck — lint scripts Bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts .sh
        run: |
          find . -name "*.sh" -not -path "./.git/*" \
            | xargs shellcheck --severity=warning

  yamllint:
    name: Yamllint — validation YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint fichiers YAML
        run: |
          find . -name "*.yml" -not -path "./.git/*" \
            | xargs yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}"

  kubeconform:
    name: Kubeconform — validation manifests Kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Validate base manifests
        run: |
          find k8s/base -name "*.yaml" -not -name "kustomization.yaml" \
            | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.28.0 \
              -summary

      - name: Validate overlay linux-server
        run: |
          find k8s/overlays/linux-server/patches -name "*.yaml" \
            | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.28.0 \
              -summary
