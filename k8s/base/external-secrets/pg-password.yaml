apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pg-password
  namespace: iam-system
  labels:
    app.kubernetes.io/name: pg-password
    app.kubernetes.io/component: secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: pg-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: PG_PASSWORD
